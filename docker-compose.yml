version: '3.8'

services:
  # MySQL数据库服务
  mysql:
    image: mysql:8.0
    container_name: lnmp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: userpassword
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - lnmp-network
    restart: unless-stopped

  # Nginx Web服务器
  nginx:
    image: nginx:alpine
    container_name: lnmp-nginx
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./html:/usr/share/nginx/html
      - ./logs/nginx:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - lnmp-network
    depends_on:
      - go-app
    restart: unless-stopped

  # Go应用服务
  go-app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: lnmp-go-app
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: app_db
      DB_USER: app_user
      DB_PASSWORD: userpassword
    volumes:
      - ./app:/app
      - ./logs/app:/app/logs
    networks:
      - lnmp-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  lnmp-network:
    driver: bridge